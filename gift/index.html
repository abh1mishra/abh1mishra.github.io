<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delayed Lines</title>
    <style>
        .line {
            opacity: 0;
            animation: fadeIn 1s forwards;
            font-size: 24px;
            margin-bottom: 20px;
            font-family: sans-serif;
        }

        .line-1 { animation-delay: 0s; color: red; }
        .line-2 { animation-delay: 3.5s; color: red; }
        .line-3 { animation-delay: 7s; color: blue; }
        .line-4 { animation-delay: 9s; color: blue; }
        .line-5 { animation-delay: 10s; color: green; }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .blink {
            animation: blink 1s linear infinite;
        }

        #landing {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        #start-button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        #content {
            display: none;
        }
    </style>
</head>
<body>
    <div id="landing">
        <button id="start-button">Open Gift</button>
        <div style="font-family: sans-serif; font-size: 18px; color: #555;">*Volume up for bestest experience</div>
    </div>

    <div id="content">
        <audio id="anthem" src="../img/communist.mp3"></audio>
        <div class="line line-1">Hi there, you are being under arrest for accepting bribe.</div>
        <div class="line line-2">Officer Dimitri and Abhishek are on their way for the arrest, reveal your location.</div>
        <div class="line line-3">Kidding, you are under arrest for being too good :)</div>
        <div class="line line-4">Happy birthday! :):).</div>
        <div class="line line-5"><img src="../img/communist.jpg" class="blink" alt="" width="200em">    <div> Flag Idea : Only <span style="color: red;">Dimitri</span></div></div>
    </div>

    <script>
        document.getElementById('start-button').addEventListener('click', function() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('anthem').play().catch(e => console.log('Audio play back failed:', e));
            }, 12000);
        });
    </script>
</body>
</html>
